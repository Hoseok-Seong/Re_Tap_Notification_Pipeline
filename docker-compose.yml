services:
  mariadb:
    image: mariadb:11.4
    container_name: retap-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-retap}
      MARIADB_USER: ${MARIADB_USER:-retap}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      TZ: ${TZ:-Asia/Seoul}
    ports:
      - "3307:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./docker/mariadb/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - retap-network

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: retap-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 10
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_RETENTION_HOURS: 24
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - retap-network

  kafka-init:
    image: confluentinc/cp-kafka:7.7.1
    container_name: retap-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic push-notifications --partitions 10 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic push-notifications-dlt --partitions 10 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --list
    networks:
      - retap-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: retap-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: retap-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "false"
    ports:
      - "8083:8080"
    networks:
      - retap-network

  fcm-mock-server:
    build:
      context: ./fcm-mock-server
    container_name: retap-fcm-mock-server
    restart: unless-stopped
    environment:
      FCM_MOCK_RESPONSE_DELAY_MS: ${FCM_MOCK_RESPONSE_DELAY_MS:-50}
      FCM_MOCK_FAILURE_RATE_PERCENT: ${FCM_MOCK_FAILURE_RATE_PERCENT:-0}
      TZ: ${TZ:-Asia/Seoul}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/metrics >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - retap-network

  notification-producer:
    build:
      context: ./notification-producer
    container_name: retap-notification-producer
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/${MARIADB_DATABASE:-retap}
      SPRING_DATASOURCE_USERNAME: ${MARIADB_USER:-retap}
      SPRING_DATASOURCE_PASSWORD: ${MARIADB_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      NOTIFICATION_TOPIC: ${NOTIFICATION_TOPIC:-push-notifications}
      NOTIFICATION_PRODUCER_BATCH_SIZE: ${NOTIFICATION_PRODUCER_BATCH_SIZE:-1000}
      TZ: ${TZ:-Asia/Seoul}
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/status >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - retap-network

  notification-consumer:
    build:
      context: ./notification-consumer
    container_name: retap-notification-consumer
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      fcm-mock-server:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/${MARIADB_DATABASE:-retap}
      SPRING_DATASOURCE_USERNAME: ${MARIADB_USER:-retap}
      SPRING_DATASOURCE_PASSWORD: ${MARIADB_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_KAFKA_CONSUMER_GROUP_ID: ${SPRING_KAFKA_CONSUMER_GROUP_ID:-notification-consumer-group}
      KAFKA_MAX_POLL_RECORDS: ${KAFKA_MAX_POLL_RECORDS:-500}
      NOTIFICATION_TOPIC: ${NOTIFICATION_TOPIC:-push-notifications}
      NOTIFICATION_DLT_TOPIC: ${NOTIFICATION_DLT_TOPIC:-push-notifications-dlt}
      NOTIFICATION_DLT_MAX_RETRY_COUNT: ${NOTIFICATION_DLT_MAX_RETRY_COUNT:-3}
      NOTIFICATION_DLT_RETRY_BACKOFF_MILLIS: ${NOTIFICATION_DLT_RETRY_BACKOFF_MILLIS:-2000}
      FCM_MOCK_BASE_URL: http://fcm-mock-server:8080
      FCM_MOCK_CONNECT_TIMEOUT_MILLIS: ${FCM_MOCK_CONNECT_TIMEOUT_MILLIS:-1000}
      FCM_MOCK_READ_TIMEOUT_MILLIS: ${FCM_MOCK_READ_TIMEOUT_MILLIS:-1000}
      TZ: ${TZ:-Asia/Seoul}
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/status >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - retap-network

volumes:
  mariadb-data:
  kafka-data:

networks:
  retap-network:
    driver: bridge
